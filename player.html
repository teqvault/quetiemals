<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Quetiemals</title>
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width=540 height=960 tabindex="0"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
    </div>
    <script src="Build/QuetiemalsWeb.loader.js"></script>
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }
        var div = document.createElement("div");
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type === "error") div.style.background = "red";
        else if (type === "warning") div.style.background = "yellow";
        else div.style.background = "black";
        updateBannerVisibility();
      }

      function fitCanvas() {
        var designAspect = 9 / 16;
        var vv = window.visualViewport;
        var vw = (vv && vv.width) ? vv.width : (container.clientWidth || window.innerWidth);
        var vh = (vv && vv.height) ? vv.height : (container.clientHeight || window.innerHeight);
        if (vw <= 0 || vh <= 0) return;

        var windowAspect = vw / vh;
        var cssWidth;
        var cssHeight;
        if (windowAspect > designAspect) {
          cssHeight = vh;
          cssWidth = cssHeight * designAspect;
        } else {
          cssWidth = vw;
          cssHeight = cssWidth / designAspect;
          if (cssHeight > vh) {
            cssHeight = vh;
            cssWidth = cssHeight * designAspect;
          }
        }

        var dpr = window.devicePixelRatio || 1;
        var pixelHeight = Math.max(1, Math.round(cssHeight * dpr));
        var pixelWidth = Math.max(1, Math.round(pixelHeight * designAspect));

        canvas.style.width = pixelWidth / dpr + "px";
        canvas.style.height = pixelHeight / dpr + "px";
        if (canvas.width !== pixelWidth || canvas.height !== pixelHeight) {
          canvas.width = pixelWidth;
          canvas.height = pixelHeight;
        }
      }

      window.addEventListener("resize", fitCanvas);
      window.addEventListener("orientationchange", fitCanvas);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", fitCanvas);
        window.visualViewport.addEventListener("scroll", fitCanvas);
      }
      fitCanvas();

      var buildUrl = "Build";
      var config = {
        dataUrl: buildUrl + "/QuetiemalsWeb.data.unityweb",
        frameworkUrl: buildUrl + "/QuetiemalsWeb.framework.js.unityweb",
        codeUrl: buildUrl + "/QuetiemalsWeb.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "TeqVault",
        productName: "Quetiemals",
        productVersion: "1.2.4",
        showBanner: unityShowBanner,
      };

      loadingBar.style.display = "block";

      createUnityInstance(canvas, config, function (progress) {
        progressBarFull.style.width = 100 * progress + "%";
        fitCanvas();
      }).then(function (unityInstance) {
        loadingBar.style.display = "none";
        fitCanvas();
        window.unityInstance = unityInstance;
      }).catch(function (message) {
        alert(message);
      });
    </script>
  </body>
</html>
